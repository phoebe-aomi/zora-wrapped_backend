<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zora-aomi-tools — API Tester</title>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6af7;
    --accent2: #4fc4cf;
    --green: #3ddc84;
    --red: #ff5c5c;
    --yellow: #f5c842;
    --text: #e8e8f0;
    --muted: #888899;
    --mono: "JetBrains Mono", "Fira Code", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; min-height: 100vh;
  }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 0; overflow-y: auto; position: sticky; top: 0; height: 100vh;
  }
  .main { padding: 28px 32px; overflow-y: auto; }

  /* ── Sidebar ── */
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; }
  .sidebar-header p  { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .server-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
  }
  .server-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 6px 8px;
    font-family: var(--mono); font-size: 12px; outline: none;
  }
  .server-row input:focus { border-color: var(--accent); }
  #ping-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background .3s;
  }
  #ping-dot.up   { background: var(--green); }
  #ping-dot.down { background: var(--red); }

  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    padding: 14px 16px 6px;
  }
  .endpoint-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 16px; background: none;
    border: none; cursor: pointer; color: var(--text);
    font-size: 12.5px; text-align: left; transition: background .15s;
  }
  .endpoint-btn:hover { background: var(--surface2); }
  .endpoint-btn.active { background: rgba(124,106,247,.15); color: var(--accent); }
  .method-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px; flex-shrink: 0; letter-spacing: .04em;
  }
  .GET  { background: rgba(77,196,207,.15); color: var(--accent2); }
  .POST { background: rgba(124,106,247,.15); color: var(--accent); }

  /* ── Main ── */
  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 20px; font-weight: 700; }
  .page-header p  { color: var(--muted); margin-top: 4px; font-size: 13px; }

  .params-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px; margin-bottom: 16px;
  }
  .params-card h3 { font-size: 11px; font-weight: 700; text-transform: uppercase;
                    letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; }
  .param-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .param-row:last-child { margin-bottom: 0; }
  .param-row label { width: 110px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .param-row input, .param-row select {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 7px 10px;
    font-family: var(--mono); font-size: 12px; outline: none;
  }
  .param-row input:focus, .param-row select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .run-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 10px 24px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s; display: flex; align-items: center; gap: 8px;
  }
  .run-btn:hover { opacity: .85; }
  .run-btn:disabled { opacity: .4; cursor: not-allowed; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .6s linear infinite; display: none;
  }
  .run-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-top: 16px; overflow: hidden;
  }
  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .result-header .status {
    font-family: var(--mono); font-weight: 700;
  }
  .status-2xx { color: var(--green); }
  .status-4xx, .status-5xx { color: var(--red); }
  .result-header .timing { color: var(--muted); }
  .copy-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 5px; padding: 3px 10px;
    font-size: 11px; cursor: pointer; transition: color .15s;
  }
  .copy-btn:hover { color: var(--text); }
  pre {
    font-family: var(--mono); font-size: 12.5px; line-height: 1.65;
    padding: 16px; overflow-x: auto; max-height: 520px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-word;
  }
  .agent-result {
    padding: 16px; border-bottom: 1px solid var(--border);
    white-space: pre-wrap; line-height: 1.7;
  }
  .empty-state {
    text-align: center; padding: 48px 16px; color: var(--muted);
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

  /* json colours */
  .jk { color: var(--accent2); }
  .js { color: var(--green); }
  .jn { color: var(--yellow); }
  .jb { color: var(--accent); }
  .jnull { color: var(--muted); }
</style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>zora-aomi-tools</h1>
      <p>API endpoint tester</p>
    </div>

    <div class="server-row">
      <span id="ping-dot" title="Server status"></span>
      <input id="base-url" value="http://localhost:3001" placeholder="http://localhost:3001">
    </div>

    <div class="section-label">Health</div>
    <button class="endpoint-btn active" data-id="health" onclick="select('health')">
      <span class="method-badge GET">GET</span>/health
    </button>

    <div class="section-label">REST — Creator</div>
    <button class="endpoint-btn" data-id="creator_stats" onclick="select('creator_stats')">
      <span class="method-badge GET">GET</span>creator stats
    </button>
    <button class="endpoint-btn" data-id="volume" onclick="select('volume')">
      <span class="method-badge GET">GET</span>volume data
    </button>
    <button class="endpoint-btn" data-id="top_buyers" onclick="select('top_buyers')">
      <span class="method-badge GET">GET</span>top buyers
    </button>
    <button class="endpoint-btn" data-id="collectors" onclick="select('collectors')">
      <span class="method-badge GET">GET</span>collectors
    </button>
    <button class="endpoint-btn" data-id="collections" onclick="select('collections')">
      <span class="method-badge GET">GET</span>collections
    </button>

    <div class="section-label">Agent</div>
    <button class="endpoint-btn" data-id="nlp_query" onclick="select('nlp_query')">
      <span class="method-badge POST">POST</span>/query
    </button>

    <div class="section-label">GraphQL</div>
    <button class="endpoint-btn" data-id="gql_creator" onclick="select('gql_creator')">
      <span class="method-badge POST">GQL</span>creatorStats
    </button>
    <button class="endpoint-btn" data-id="gql_volume" onclick="select('gql_volume')">
      <span class="method-badge POST">GQL</span>volumeData
    </button>
    <button class="endpoint-btn" data-id="gql_buyers" onclick="select('gql_buyers')">
      <span class="method-badge POST">GQL</span>topBuyers
    </button>
    <button class="endpoint-btn" data-id="gql_collectors" onclick="select('gql_collectors')">
      <span class="method-badge POST">GQL</span>collectors
    </button>
    <button class="endpoint-btn" data-id="gql_dashboard" onclick="select('gql_dashboard')">
      <span class="method-badge POST">GQL</span>full dashboard
    </button>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div id="view"></div>
  </main>
</div>

<script>
const ENDPOINTS = {
  health: {
    label: "Health Check",
    desc: "Confirms the server is up and listening.",
    method: "GET",
    path: () => "/health",
    params: [],
  },
  creator_stats: {
    label: "Creator Stats",
    desc: "Aggregated stats for a wallet: mints, volume, holders, growth.",
    method: "GET",
    path: (p) => `/api/creator/${p.wallet}`,
    params: [{ id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" }],
  },
  volume: {
    label: "Volume Data",
    desc: "Time-series volume for a creator wallet.",
    method: "GET",
    path: (p) => `/api/creator/${p.wallet}/volume`,
    params: [{ id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" }],
  },
  top_buyers: {
    label: "Top Buyers",
    desc: "Top N buy-side traders ranked by aggregate coin amount.",
    method: "GET",
    path: (p) => `/api/creator/${p.wallet}/top-buyers?top_n=${p.top_n}`,
    params: [
      { id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" },
      { id: "top_n",  label: "top_n",          placeholder: "5",  default: "5"  },
    ],
  },
  collectors: {
    label: "Collectors",
    desc: "Holders of creator's coins, sorted by coins held.",
    method: "GET",
    path: (p) => `/api/creator/${p.wallet}/collectors?count=${p.count}`,
    params: [
      { id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" },
      { id: "count",  label: "count",          placeholder: "10", default: "10" },
    ],
  },
  collections: {
    label: "Collections",
    desc: "Coins created by this wallet with market data.",
    method: "GET",
    path: (p) => `/api/creator/${p.wallet}/collections?count=${p.count}`,
    params: [
      { id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" },
      { id: "count",  label: "count",          placeholder: "20", default: "20" },
    ],
  },
  nlp_query: {
    label: "Agent Query",
    desc: "Ask a plain-English question about a Zora coin.",
    method: "POST",
    path: () => "/query",
    body: (p) => ({ query: p.query }),
    params: [
      {
        id: "query",
        label: "Query",
        placeholder: "Show top 5 buyers of 0x...",
        default: "Show top 5 buyers of 0xF5735B760e2194521377A24a5c1e830aFa83aCDB",
      },
    ],
  },
  gql_creator: {
    label: "GraphQL — creatorStats",
    desc: "Query creatorStats via GraphQL.",
    method: "POST",
    path: () => "/graphql",
    gql: (p) => ({
      query: `{ creatorStats(wallet: "${p.wallet}") { wallet name avatar totalMints volumeEth uniqueHolders growth30D } }`,
    }),
    params: [{ id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" }],
  },
  gql_volume: {
    label: "GraphQL — volumeData",
    desc: "Query time-series volume via GraphQL.",
    method: "POST",
    path: () => "/graphql",
    gql: (p) => ({
      query: `{ volumeData(wallet: "${p.wallet}") { date volume } }`,
    }),
    params: [{ id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" }],
  },
  gql_buyers: {
    label: "GraphQL — topBuyers",
    desc: "Query top buyers via GraphQL.",
    method: "POST",
    path: () => "/graphql",
    gql: (p) => ({
      query: `{ topBuyers(wallet: "${p.wallet}", topN: ${p.top_n}) { rank wallet percentage amountEth } }`,
    }),
    params: [
      { id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" },
      { id: "top_n",  label: "topN",           placeholder: "5",  default: "5"  },
    ],
  },
  gql_collectors: {
    label: "GraphQL — collectors",
    desc: "Query collectors via GraphQL.",
    method: "POST",
    path: () => "/graphql",
    gql: (p) => ({
      query: `{ collectors(wallet: "${p.wallet}", count: ${p.count}) { rank wallet coinsHeld firstPurchase totalSpentEth badge } }`,
    }),
    params: [
      { id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" },
      { id: "count",  label: "count",          placeholder: "10", default: "10" },
    ],
  },
  gql_dashboard: {
    label: "GraphQL — Full Dashboard",
    desc: "Fetch all creator data in one GraphQL query.",
    method: "POST",
    path: () => "/graphql",
    gql: (p) => ({
      query: `query CreatorDashboard($wallet: String!) {
  creatorStats(wallet: $wallet) { wallet name avatar totalMints volumeEth uniqueHolders growth30D }
  volumeData(wallet: $wallet) { date volume }
  topBuyers(wallet: $wallet, topN: 5) { rank wallet percentage amountEth }
  collectors(wallet: $wallet, count: 10) { rank wallet coinsHeld firstPurchase totalSpentEth badge }
  collections(wallet: $wallet, count: 20) { id name priceEth volumeEth holders thumbnail }
}`,
      variables: { wallet: p.wallet },
    }),
    params: [{ id: "wallet", label: "Wallet address", placeholder: "0x…", default: "" }],
  },
};

let current = "health";

function select(id) {
  current = id;
  document.querySelectorAll(".endpoint-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.id === id);
  });
  render(id);
}

function render(id) {
  const ep = ENDPOINTS[id];
  const view = document.getElementById("view");

  const paramInputs = ep.params.map(p => `
    <div class="param-row">
      <label>${p.label}</label>
      <input id="p_${p.id}" placeholder="${p.placeholder}" value="${p.default}">
    </div>`).join("");

  view.innerHTML = `
    <div class="page-header">
      <h2>${ep.label}</h2>
      <p>${ep.desc}</p>
    </div>
    ${ep.params.length ? `
    <div class="params-card">
      <h3>Parameters</h3>
      ${paramInputs}
    </div>` : ""}
    <button class="run-btn" id="run-btn" onclick="run()">
      <span class="spinner" id="spinner"></span>
      Send Request
    </button>
    <div id="result">
      <div class="empty-state">
        <div class="icon">↑</div>
        <p>Hit Send Request to see the response</p>
      </div>
    </div>
  `;
}

async function run() {
  const ep = ENDPOINTS[current];
  const btn = document.getElementById("run-btn");
  const spinner = document.getElementById("spinner");
  const base = document.getElementById("base-url").value.replace(/\/$/, "");

  const params = {};
  ep.params.forEach(p => {
    params[p.id] = document.getElementById(`p_${p.id}`)?.value ?? "";
  });

  btn.disabled = true;
  btn.classList.add("loading");
  spinner.style.display = "block";

  const url = base + ep.path(params);
  const isGql = !!ep.gql;
  const opts = {
    method: ep.method,
    headers: { "Content-Type": "application/json" },
  };
  if (isGql) opts.body = JSON.stringify(ep.gql(params));
  if (ep.body) opts.body = JSON.stringify(ep.body(params));

  const t0 = performance.now();
  let status = 0, body = "";

  try {
    const res = await fetch(url, opts);
    status = res.status;
    body = await res.text();
  } catch (err) {
    body = `Network error: ${err.message}\n\nMake sure your Rust server is running:\n  PORT=3001 cargo run -- serve\n\nAnd that CORS is configured (tower-http CorsLayer with allow_origin(Any)).`;
    status = 0;
  }

  const elapsed = Math.round(performance.now() - t0);
  btn.disabled = false;
  btn.classList.remove("loading");
  spinner.style.display = "none";

  let pretty = body;
  let parsed = null;
  try {
    parsed = JSON.parse(body);
    pretty = JSON.stringify(parsed, null, 2);
  } catch {}

  const agentResult = parsed && typeof parsed.result === "string" && parsed.result
    ? `<div class="agent-result">${escapeHtml(parsed.result)}</div>`
    : "";

  const cls = status === 0 ? "" : status < 300 ? "status-2xx" : status < 500 ? "status-4xx" : "status-5xx";
  const label = status === 0 ? "Network Error" : `HTTP ${status}`;

  document.getElementById("result").innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="status ${cls}">${label}</span>
        <span class="timing">${elapsed} ms — ${url}</span>
        <button class="copy-btn" onclick="copy(this)">Copy</button>
      </div>
      ${agentResult}
      <pre id="json-out">${colorize(pretty)}</pre>
    </div>
  `;
}

function copy(btn) {
  const text = document.getElementById("json-out").innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1500);
  });
}

function colorize(json) {
  return escapeHtml(json)
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*")(\s*:)?/g, (m, s, _e, colon) => {
      if (colon) return `<span class="jk">${s}</span>:`;
      return `<span class="js">${s}</span>`;
    })
    .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span class="jn">$1</span>')
    .replace(/\b(true|false)\b/g, '<span class="jb">$1</span>')
    .replace(/\bnull\b/g, '<span class="jnull">null</span>');
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// Ping the server every 4s
async function ping() {
  const dot = document.getElementById("ping-dot");
  const base = document.getElementById("base-url").value.replace(/\/$/, "");
  try {
    const res = await fetch(`${base}/health`, { signal: AbortSignal.timeout(2000) });
    dot.className = res.ok ? "up" : "down";
  } catch {
    dot.className = "down";
  }
}

document.getElementById("base-url").addEventListener("change", ping);
setInterval(ping, 4000);
ping();

// Initial render
render("health");
</script>
</body>
</html>
